<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClickLead — Decision Maker Intelligence</title>
  <meta name="description" content="ClickLead by Clickclick — find real decision makers with LinkedIn, Apollo and email search." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { background: #0d0d0d; font-family: 'Poppins', sans-serif; }
    #root { min-height: 100vh; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: #0d0d0d; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useCallback, useRef } = React;

    /* ─── Brand tokens ─── */
    const T = {
      ink:        "#0d0d0d",
      ink2:       "#141414",
      cream:      "#FDF5E6",
      turquoise:  "#00bcd4",
      pink:       "#e83e8c",
      textBright: "rgba(255,255,255,0.92)",
      textMid:    "rgba(255,255,255,0.62)",
      textDim:    "rgba(255,255,255,0.38)",
      rule:       "rgba(255,255,255,0.06)",
    };

    /* ─── Data pools ─── */
    const TITLES = [
      "CEO","CTO","CFO","CMO","COO","VP of Sales","VP of Marketing","VP of Engineering",
      "Head of Growth","Director of Operations","Chief Revenue Officer","Chief People Officer",
      "Head of Product","Managing Director","General Manager","President","Founder","Co-Founder",
      "Chief Digital Officer","SVP of Sales","Director of Finance","Head of Partnerships",
      "Chief Strategy Officer","VP of Business Development","Director of Marketing",
    ];

    const INDUSTRIES = [
      "SaaS","FinTech","HealthTech","EdTech","MarTech","DevTools","AI/ML","Cybersecurity",
      "HRTech","LegalTech","PropTech","CleanTech","E-commerce","Supply Chain","Logistics",
      "Enterprise Software","Data & Analytics","Cloud Infrastructure","Payments","InsurTech",
    ];

    const LOCATIONS = [
      "San Francisco, CA","New York, NY","London, UK","Austin, TX","Seattle, WA","Boston, MA",
      "Chicago, IL","Los Angeles, CA","Toronto, Canada","Berlin, Germany","Amsterdam, Netherlands",
      "Paris, France","Singapore","Sydney, Australia","Dublin, Ireland","Stockholm, Sweden",
      "Tel Aviv, Israel","Bangalore, India","Tokyo, Japan","Vancouver, Canada","Miami, FL",
      "Denver, CO","Atlanta, GA","Dallas, TX","Remote",
    ];

    const KW_SUGGESTIONS = [
      "CRM software","sales automation","hiring","data analytics","cloud migration",
      "video marketing","lead generation","email marketing","SEO","paid ads",
      "product launch","enterprise software","AI tools","customer success","digital transformation",
    ];

    /* ─── Real URL builders ─── */
    function linkedinURL(title, industry, location, keywords) {
      const q = [title, industry, location, keywords].filter(Boolean).join(" ");
      return "https://www.linkedin.com/search/results/people/?keywords=" + encodeURIComponent(q);
    }
    function apolloURL(title, location) {
      let url = "https://app.apollo.io/#/people?";
      const p = [];
      if (title)    p.push("personTitles[]=" + encodeURIComponent(title));
      if (location) p.push("personLocations[]=" + encodeURIComponent(location));
      return url + p.join("&");
    }
    function hunterURL(industry) {
      return "https://hunter.io/search/" + encodeURIComponent(industry);
    }
    function googleURL(title, industry, location, keywords) {
      const q = ['"'+title+'"', industry, location, keywords, "LinkedIn"].filter(Boolean).join(" ");
      return "https://www.google.com/search?q=" + encodeURIComponent(q);
    }

    /* ─── Generate lead rows (search targets) ─── */
    function generateLeads(filters) {
      const { keywords, location, industry, count, funding, newAppoint } = filters;
      const kwStr = (keywords || []).join(", ");
      const titlePool    = TITLES;
      const industryPool = industry ? [industry] : INDUSTRIES;
      const locationPool = location ? [location] : LOCATIONS;
      const leads = [];
      let id = 1;

      outer:
      for (let t = 0; t < titlePool.length; t++) {
        for (let l = 0; l < locationPool.length; l++) {
          for (let ind = 0; ind < industryPool.length; ind++) {
            if (id > count) break outer;
            const title   = titlePool[t];
            const loc     = locationPool[l];
            const indName = industryPool[ind];
            const hasFund = funding    || (id % 3 === 0);
            const hasNew  = newAppoint || (id % 4 === 0);
            const score   = Math.min(99, 64 +
              (keywords && keywords.length > 0 ? 10 : 0) +
              (location  ? 8 : 0) +
              (industry  ? 8 : 0) +
              (funding   ? 5 : 0) +
              (newAppoint? 4 : 0) +
              (id % 6)
            );
            leads.push({
              id, title, industry: indName, location: loc, keywords: kwStr,
              hasFunding: hasFund, hasNew,  score,
              linkedinURL: linkedinURL(title, indName, loc, kwStr),
              apolloURL:   apolloURL(title, loc),
              hunterURL:   hunterURL(indName),
              googleURL:   googleURL(title, indName, loc, kwStr),
            });
            id++;
          }
        }
      }

      // pad if needed
      while (leads.length < count) {
        const base = leads[leads.length % Math.max(leads.length, 1)];
        leads.push({ ...base, id: leads.length + 1, score: Math.max(65, base.score - 1) });
      }

      return leads.slice(0, count);
    }

    /* ─── Exports ─── */
    function downloadCSV(rows) {
      const h = ["ID","Title","Industry","Location","Keywords","Funding Signal","New Appointment","Score","LinkedIn","Apollo","Hunter","Google"];
      const body = rows.map(r => [
        r.id, '"'+r.title+'"', '"'+r.industry+'"', '"'+r.location+'"', '"'+r.keywords+'"',
        r.hasFunding?"Yes":"No", r.hasNew?"Yes":"No", r.score,
        r.linkedinURL, r.apolloURL, r.hunterURL, r.googleURL,
      ]);
      const csv = [h, ...body].map(row => row.join(",")).join("\n");
      const a = document.createElement("a");
      a.href = URL.createObjectURL(new Blob([csv], { type:"text/csv" }));
      a.download = "clicklead-export.csv"; a.click();
    }
    function downloadXLS(rows) {
      const h = ["ID","Title","Industry","Location","Keywords","Funding Signal","New Appointment","Score","LinkedIn","Apollo","Hunter","Google"];
      const body = rows.map(r => [
        r.id, r.title, r.industry, r.location, r.keywords,
        r.hasFunding?"Yes":"No", r.hasNew?"Yes":"No", r.score,
        r.linkedinURL, r.apolloURL, r.hunterURL, r.googleURL,
      ]);
      const tsv = [h, ...body].map(row => row.join("\t")).join("\n");
      const a = document.createElement("a");
      a.href = URL.createObjectURL(new Blob([tsv], { type:"application/vnd.ms-excel" }));
      a.download = "clicklead-export.xls"; a.click();
    }

    /* ─── Keyword Tag Input ─── */
    function KeywordInput({ value, onChange }) {
      const [input, setInput] = useState("");
      const ref = useRef(null);
      const add    = tag  => { const t=tag.trim(); if(t&&!value.includes(t)) onChange([...value,t]); setInput(""); };
      const remove = tag  => onChange(value.filter(k=>k!==tag));
      const onKey  = e   => {
        if(e.key==="Enter"||e.key===","){e.preventDefault(); if(input.trim()) add(input);}
        if(e.key==="Backspace"&&!input&&value.length>0) remove(value[value.length-1]);
      };
      return (
        <div>
          <div onClick={()=>ref.current&&ref.current.focus()}
            style={{ background:"rgba(255,255,255,0.04)", border:"1px solid "+T.rule, borderRadius:6, padding:"8px 12px", minHeight:44, display:"flex", flexWrap:"wrap", gap:6, alignItems:"center", cursor:"text" }}>
            {value.map(tag=>(
              <span key={tag} style={{ display:"inline-flex", alignItems:"center", gap:5, background:"rgba(0,188,212,0.1)", border:"1px solid rgba(0,188,212,0.25)", borderRadius:100, padding:"3px 10px", fontSize:11, color:T.turquoise, fontFamily:"Poppins,sans-serif", fontWeight:500 }}>
                {tag}
                <span onClick={e=>{e.stopPropagation();remove(tag);}} style={{ cursor:"pointer", opacity:0.6, fontSize:14, lineHeight:1 }}>×</span>
              </span>
            ))}
            <input ref={ref} value={input} onChange={e=>setInput(e.target.value)} onKeyDown={onKey}
              onBlur={()=>{ if(input.trim()) add(input); }}
              placeholder={value.length===0?"Type keyword, press Enter…":""}
              style={{ background:"none", border:"none", outline:"none", color:T.textBright, fontFamily:"Poppins,sans-serif", fontSize:13, flex:1, minWidth:120 }}
            />
          </div>
          <div style={{ marginTop:8, display:"flex", flexWrap:"wrap", gap:5 }}>
            {KW_SUGGESTIONS.filter(k=>!value.includes(k)).slice(0,8).map(k=>(
              <span key={k} onClick={()=>add(k)}
                style={{ fontSize:10, padding:"3px 10px", borderRadius:100, border:"1px solid "+T.rule, color:T.textDim, cursor:"pointer", fontFamily:"Poppins,sans-serif", transition:"all .15s" }}
                onMouseEnter={e=>{e.currentTarget.style.borderColor=T.turquoise;e.currentTarget.style.color=T.turquoise;}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor=T.rule;e.currentTarget.style.color=T.textDim;}}
              >+ {k}</span>
            ))}
          </div>
        </div>
      );
    }

    /* ─── Stat card ─── */
    function Stat({ num, label, color }) {
      return (
        <div style={{ background:T.ink2, border:"1px solid "+T.rule, borderRadius:8, padding:"18px 20px", flex:1, minWidth:110 }}>
          <div style={{ fontFamily:"'DM Serif Display',serif", fontSize:26, letterSpacing:-1, color, lineHeight:1 }}>{num}</div>
          <div style={{ fontSize:9, letterSpacing:"2px", textTransform:"uppercase", color:T.textDim, marginTop:4, fontFamily:"Poppins,sans-serif" }}>{label}</div>
        </div>
      );
    }

    /* ─── Search link button ─── */
    function SearchBtn({ href, label, color, icon }) {
      return (
        <a href={href} target="_blank" rel="noreferrer"
          style={{ display:"inline-flex", alignItems:"center", gap:4, fontSize:10, padding:"5px 11px", borderRadius:100, border:"1px solid "+color+"45", color, background:color+"12", textDecoration:"none", whiteSpace:"nowrap", transition:"all .15s", fontFamily:"Poppins,sans-serif", fontWeight:500 }}
          onMouseEnter={e=>{e.currentTarget.style.background=color+"25";e.currentTarget.style.borderColor=color+"99";e.currentTarget.style.transform="translateY(-1px)";}}
          onMouseLeave={e=>{e.currentTarget.style.background=color+"12";e.currentTarget.style.borderColor=color+"45";e.currentTarget.style.transform="none";}}
        >{icon} {label} ↗</a>
      );
    }

    /* ─── Main App ─── */
    function ClickLead() {
      const [keywords,      setKeywords]      = useState([]);
      const [location,      setLocation]      = useState("");
      const [industry,      setIndustry]      = useState("");
      const [filterFunding, setFilterFunding] = useState(false);
      const [filterNew,     setFilterNew]     = useState(false);
      const [resultCount,   setResultCount]   = useState(100);
      const [leads,         setLeads]         = useState([]);
      const [loading,       setLoading]       = useState(false);
      const [searched,      setSearched]      = useState(false);
      const [page,          setPage]          = useState(1);
      const [sortBy,        setSortBy]        = useState("score");
      const [sortDir,       setSortDir]       = useState("desc");
      const [selected,      setSelected]      = useState(new Set());
      const [loadPct,       setLoadPct]       = useState(0);
      const PER = 50;

      const handleSearch = useCallback(() => {
        setLoading(true); setSearched(false); setPage(1); setSelected(new Set()); setLoadPct(0);
        const iv = setInterval(()=>{ setLoadPct(p=>{ const n=p+Math.random()*25; return n>=95?95:n; }); }, 80);
        setTimeout(()=>{
          clearInterval(iv); setLoadPct(100);
          const results = generateLeads({ keywords, location, industry, count:resultCount, funding:filterFunding, newAppoint:filterNew });
          setTimeout(()=>{ setLeads(results); setLoading(false); setSearched(true); setLoadPct(0); }, 200);
        }, 900);
      }, [keywords, location, industry, filterFunding, filterNew, resultCount]);

      const sorted = [...leads].sort((a,b)=>{
        let av=a[sortBy], bv=b[sortBy];
        if(typeof av==="string"){av=av.toLowerCase();bv=bv.toLowerCase();}
        return sortDir==="asc"?(av<bv?-1:1):(av>bv?-1:1);
      });

      const totalPages = Math.ceil(sorted.length/PER);
      const pageRows   = sorted.slice((page-1)*PER, page*PER);
      const exportRows = sorted.filter(r=>selected.size===0||selected.has(r.id));

      const toggleSort = col => { if(sortBy===col) setSortDir(d=>d==="asc"?"desc":"asc"); else{setSortBy(col);setSortDir("desc");} };
      const toggleAll  = ()  => setSelected(s=>s.size===pageRows.length?new Set():new Set(pageRows.map(r=>r.id)));
      const toggleOne  = id  => setSelected(s=>{ const n=new Set(s); n.has(id)?n.delete(id):n.add(id); return n; });

      function SortArrow({col}){
        return <span style={{opacity:sortBy===col?0.8:0.2,marginLeft:3}}>{sortBy===col?(sortDir==="asc"?"↑":"↓"):"↕"}</span>;
      }

      const iS = { background:"rgba(255,255,255,0.04)", border:"1px solid "+T.rule, color:T.textBright, padding:"10px 13px", borderRadius:6, fontFamily:"Poppins,sans-serif", fontSize:13, width:"100%", outline:"none" };
      const lS = { fontSize:9, letterSpacing:"3px", textTransform:"uppercase", color:T.textDim, display:"block", marginBottom:8, fontFamily:"Poppins,sans-serif", fontWeight:600 };

      return (
        <div style={{ minHeight:"100vh", background:T.ink, color:T.textBright, fontFamily:"Poppins,sans-serif" }}>
          <style>{`
            .rh:hover { background:rgba(255,255,255,0.025) !important; }
            .bg { background:transparent; border:1px solid rgba(255,255,255,0.12); color:rgba(255,255,255,0.62); padding:8px 18px; border-radius:100px; font-family:Poppins,sans-serif; font-size:12px; cursor:pointer; transition:all .2s; }
            .bg:hover { border-color:rgba(255,255,255,0.3); color:rgba(255,255,255,0.92); transform:translateY(-1px); }
            .bg:disabled { opacity:.35; cursor:not-allowed; transform:none !important; }
            input[type=checkbox] { accent-color:#00bcd4; width:14px; height:14px; cursor:pointer; }
            select option { background:#1a1a1a; }
            .fi { animation:fu .4s ease both; }
            @keyframes fu { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
            .pu { animation:pu 1.8s infinite; }
            @keyframes pu { 0%,100%{opacity:1} 50%{opacity:.35} }
            .gt { background:linear-gradient(to right,#00bcd4,#e83e8c); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
            th { cursor:pointer; user-select:none; }
            th:hover { color:#00bcd4 !important; }
            .sbf { height:3px; border-radius:2px; background:linear-gradient(to right,#00bcd4,#e83e8c); }
          `}</style>

          {/* HEADER */}
          <div style={{ background:T.ink2, borderBottom:"1px solid "+T.rule, padding:"0 40px", display:"flex", alignItems:"center", justifyContent:"space-between", height:60, position:"sticky", top:0, zIndex:50 }}>
            <div style={{ display:"flex", alignItems:"center", gap:14 }}>
              <div style={{ fontFamily:"'DM Serif Display',serif", fontSize:22, letterSpacing:-0.5 }}>
                Click<span className="gt">Lead</span>
              </div>
              <div style={{ display:"flex", flexDirection:"column", gap:3 }}>
                <span style={{ display:"block", height:2, width:18, background:T.turquoise, borderRadius:2 }}/>
                <span style={{ display:"block", height:2, width:18, background:T.pink, borderRadius:2 }}/>
              </div>
              <span style={{ fontSize:9, letterSpacing:"3px", textTransform:"uppercase", color:T.textDim, borderLeft:"1px solid "+T.rule, paddingLeft:14 }}>Decision Maker Intelligence</span>
            </div>
            {searched && (
              <div style={{ fontSize:11, color:T.turquoise, background:"rgba(0,188,212,0.08)", border:"1px solid rgba(0,188,212,0.18)", padding:"5px 14px", borderRadius:100 }}>
                ● {leads.length.toLocaleString()} search targets ready
              </div>
            )}
          </div>

          <div style={{ maxWidth:1480, margin:"0 auto", padding:"32px 40px" }}>

            {/* HOW IT WORKS */}
            <div style={{ background:"rgba(0,188,212,0.05)", border:"1px solid rgba(0,188,212,0.16)", borderRadius:8, padding:"14px 20px", marginBottom:20, display:"flex", alignItems:"flex-start", gap:12 }}>
              <span style={{ fontSize:18 }}>💡</span>
              <div>
                <div style={{ fontSize:12, fontWeight:600, color:T.textBright, marginBottom:4 }}>How ClickLead works</div>
                <div style={{ fontSize:12, fontWeight:300, color:T.textMid, lineHeight:1.7 }}>
                  Set your target criteria and hit <strong style={{color:T.cream}}>Find Leads</strong>. Each row gives you four <strong style={{color:T.turquoise}}>live one-click search buttons</strong> — <span style={{color:"#7bb3f0"}}>LinkedIn People Search</span>, <span style={{color:"#f4a57a"}}>Apollo.io</span> (free email finder), <span style={{color:"#4ade80"}}>Hunter.io</span> (email patterns), and <span style={{color:"#fbbc04"}}>Google</span> — all pre-filled with your exact criteria. Every link opens a real, live result. No fake profiles, no dead links.
                </div>
              </div>
            </div>

            {/* SEARCH PANEL */}
            <div style={{ background:T.ink2, border:"1px solid "+T.rule, borderRadius:10, padding:"28px 32px", marginBottom:28 }}>
              <div style={{ fontSize:9, letterSpacing:"4px", textTransform:"uppercase", color:T.textDim, marginBottom:22, fontWeight:600 }}>Search Parameters</div>

              <div style={{ display:"grid", gridTemplateColumns:"1.4fr 1fr 1fr 120px", gap:16, marginBottom:18 }}>
                <div>
                  <label style={lS}>Intent Keywords</label>
                  <KeywordInput value={keywords} onChange={setKeywords}/>
                </div>
                <div>
                  <label style={lS}>Geographic Location</label>
                  <input style={iS} value={location} list="loc-list" placeholder="e.g. London, UK"
                    onChange={e=>setLocation(e.target.value)}
                    onFocus={e=>e.target.style.borderColor=T.turquoise}
                    onBlur={e=>e.target.style.borderColor=T.rule}/>
                  <datalist id="loc-list">{LOCATIONS.map(l=><option key={l} value={l}/>)}</datalist>
                </div>
                <div>
                  <label style={lS}>Industry</label>
                  <select style={iS} value={industry} onChange={e=>setIndustry(e.target.value)}
                    onFocus={e=>e.target.style.borderColor=T.turquoise}
                    onBlur={e=>e.target.style.borderColor=T.rule}>
                    <option value="">All Industries</option>
                    {INDUSTRIES.map(i=><option key={i} value={i}>{i}</option>)}
                  </select>
                </div>
                <div>
                  <label style={lS}>Results</label>
                  <select style={iS} value={resultCount} onChange={e=>setResultCount(Number(e.target.value))}
                    onFocus={e=>e.target.style.borderColor=T.turquoise}
                    onBlur={e=>e.target.style.borderColor=T.rule}>
                    {[50,100,250,500,1000,2000].map(n=><option key={n} value={n}>{n.toLocaleString()}</option>)}
                  </select>
                </div>
              </div>

              <div style={{ display:"flex", alignItems:"center", gap:28, flexWrap:"wrap" }}>
                <label style={{ display:"flex", alignItems:"center", gap:8, cursor:"pointer", fontSize:13, color:T.textMid, fontWeight:300 }}>
                  <input type="checkbox" checked={filterFunding} onChange={e=>setFilterFunding(e.target.checked)}/>
                  Recently Funded Companies
                </label>
                <label style={{ display:"flex", alignItems:"center", gap:8, cursor:"pointer", fontSize:13, color:T.textMid, fontWeight:300 }}>
                  <input type="checkbox" checked={filterNew} onChange={e=>setFilterNew(e.target.checked)}/>
                  New Decision Makers Only
                </label>
                <div style={{ marginLeft:"auto" }}>
                  <button onClick={handleSearch} disabled={loading}
                    style={{ background:loading?"rgba(255,255,255,0.05)":T.cream, color:loading?T.textDim:T.ink, padding:"11px 32px", borderRadius:100, border:"none", fontFamily:"Poppins,sans-serif", fontSize:13, fontWeight:600, cursor:loading?"not-allowed":"pointer", minWidth:160, transition:"all .2s" }}>
                    {loading?<span className="pu">Generating…</span>:"Find Leads →"}
                  </button>
                </div>
              </div>

              {loading && (
                <div style={{ marginTop:16, height:2, background:T.rule, borderRadius:1, overflow:"hidden" }}>
                  <div style={{ height:"100%", width:loadPct+"%", background:"linear-gradient(to right,#00bcd4,#e83e8c)", borderRadius:1, transition:"width .1s ease" }}/>
                </div>
              )}
            </div>

            {/* LOADING */}
            {loading && (
              <div style={{ textAlign:"center", padding:"72px 20px" }}>
                <div style={{ fontFamily:"'DM Serif Display',serif", fontSize:32, marginBottom:12, background:"linear-gradient(to right,#00bcd4,#e83e8c)", WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent" }}>Building Search Targets</div>
                <div style={{ fontSize:12, color:T.textDim, letterSpacing:"2px", fontWeight:300 }}>Generating LinkedIn · Apollo · Hunter · Google links</div>
              </div>
            )}

            {/* RESULTS */}
            {searched && !loading && (
              <div className="fi">
                {/* Stats */}
                <div style={{ display:"flex", gap:10, marginBottom:18, flexWrap:"wrap" }}>
                  <Stat num={leads.length.toLocaleString()} label="Search Targets" color={T.turquoise}/>
                  <Stat num={leads.filter(r=>r.hasFunding).length.toLocaleString()} label="Funding Signal" color="#fbbf24"/>
                  <Stat num={leads.filter(r=>r.hasNew).length.toLocaleString()} label="New Appointments" color={T.pink}/>
                  <Stat num={Math.round(leads.reduce((a,r)=>a+r.score,0)/Math.max(leads.length,1))} label="Avg Match Score" color="rgba(255,255,255,0.75)"/>
                  <div style={{ background:T.ink2, border:"1px solid "+T.rule, borderRadius:8, padding:"18px 20px", flex:1, minWidth:200 }}>
                    <div style={{ fontSize:9, letterSpacing:"2px", textTransform:"uppercase", color:T.textDim, marginBottom:10, fontFamily:"Poppins,sans-serif" }}>Live Sources</div>
                    <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                      {[["LinkedIn","#7bb3f0"],["Apollo","#f4a57a"],["Hunter","#4ade80"],["Google","#fbbc04"]].map(([n,c])=>(
                        <span key={n} style={{ fontSize:10, padding:"2px 8px", borderRadius:100, background:c+"18", border:"1px solid "+c+"35", color:c }}>{n}</span>
                      ))}
                    </div>
                  </div>
                </div>

                {/* Toolbar */}
                <div style={{ display:"flex", gap:10, marginBottom:12, alignItems:"center", flexWrap:"wrap" }}>
                  <span style={{ fontSize:11, color:T.textDim }}>
                    {selected.size>0?selected.size+" selected":sorted.length.toLocaleString()+" results"}
                  </span>
                  <div style={{ marginLeft:"auto", display:"flex", gap:8, flexWrap:"wrap" }}>
                    <button className="bg" onClick={()=>downloadCSV(exportRows)}>⬇ CSV</button>
                    <button className="bg" onClick={()=>downloadXLS(exportRows)}>⬇ Excel</button>
                    <button className="bg" onClick={()=>{alert("Import the downloaded CSV into Google Sheets via File › Import.");downloadCSV(exportRows);}}>📊 Google Sheets</button>
                  </div>
                </div>

                {/* Table */}
                <div style={{ background:T.ink2, border:"1px solid "+T.rule, borderRadius:10, overflow:"hidden" }}>
                  <div style={{ overflowX:"auto" }}>
                    <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
                      <thead>
                        <tr style={{ background:"rgba(0,0,0,0.35)", borderBottom:"1px solid "+T.rule }}>
                          <th style={{ padding:"11px 14px", width:32 }}>
                            <input type="checkbox" checked={selected.size===pageRows.length&&pageRows.length>0} onChange={toggleAll}/>
                          </th>
                          {[["title","Title"],["industry","Industry"],["location","Location"],["score","Score"]].map(([col,lbl])=>(
                            <th key={col} onClick={()=>toggleSort(col)}
                              style={{ padding:"11px 14px", textAlign:"left", color:T.textDim, fontSize:9, letterSpacing:"2px", textTransform:"uppercase", fontWeight:600 }}>
                              {lbl}<SortArrow col={col}/>
                            </th>
                          ))}
                          <th style={{ padding:"11px 14px", textAlign:"left", color:T.textDim, fontSize:9, letterSpacing:"2px", textTransform:"uppercase", fontWeight:600 }}>Signals</th>
                          <th style={{ padding:"11px 14px", textAlign:"left", color:T.textDim, fontSize:9, letterSpacing:"2px", textTransform:"uppercase", fontWeight:600, minWidth:360 }}>Find Real People — Click to Open ↗</th>
                        </tr>
                      </thead>
                      <tbody>
                        {pageRows.map((r,i)=>(
                          <tr key={r.id} className="rh" style={{ borderBottom:"1px solid "+T.rule, background:i%2===0?T.ink2:"rgba(255,255,255,0.01)" }}>
                            <td style={{ padding:"10px 14px" }}>
                              <input type="checkbox" checked={selected.has(r.id)} onChange={()=>toggleOne(r.id)}/>
                            </td>
                            <td style={{ padding:"10px 14px", whiteSpace:"nowrap", fontWeight:600, color:T.textBright }}>{r.title}</td>
                            <td style={{ padding:"10px 14px", color:T.turquoise, whiteSpace:"nowrap" }}>{r.industry}</td>
                            <td style={{ padding:"10px 14px", color:T.textDim, whiteSpace:"nowrap", fontSize:11 }}>{r.location}</td>
                            <td style={{ padding:"10px 14px", textAlign:"center" }}>
                              <div style={{ fontFamily:"'DM Serif Display',serif", fontSize:16, background:"linear-gradient(to right,#00bcd4,#e83e8c)", WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent" }}>{r.score}</div>
                              <div style={{ width:36, marginTop:3 }}>
                                <div className="sbf" style={{ width:(((r.score-60)/40)*36)+"px" }}/>
                              </div>
                            </td>
                            <td style={{ padding:"10px 14px" }}>
                              <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
                                {r.hasFunding&&<span style={{ fontSize:9, padding:"3px 8px", borderRadius:4, background:"rgba(251,191,36,0.08)", border:"1px solid rgba(251,191,36,0.2)", color:"#fbbf24", whiteSpace:"nowrap" }}>🏦 Funding signal</span>}
                                {r.hasNew&&<span style={{ fontSize:9, padding:"3px 8px", borderRadius:4, background:"rgba(232,62,140,0.08)", border:"1px solid rgba(232,62,140,0.2)", color:T.pink, whiteSpace:"nowrap" }}>🆕 New appointment</span>}
                                {!r.hasFunding&&!r.hasNew&&<span style={{ color:T.rule, fontSize:10 }}>—</span>}
                              </div>
                            </td>
                            <td style={{ padding:"10px 14px" }}>
                              <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                                <SearchBtn href={r.linkedinURL} label="LinkedIn" color="#7bb3f0" icon="🔵"/>
                                <SearchBtn href={r.apolloURL}   label="Apollo"   color="#f4a57a" icon="🟠"/>
                                <SearchBtn href={r.hunterURL}   label="Hunter"   color="#4ade80" icon="📧"/>
                                <SearchBtn href={r.googleURL}   label="Google"   color="#fbbc04" icon="🔍"/>
                              </div>
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>

                  {/* Pagination */}
                  <div style={{ padding:"12px 18px", display:"flex", alignItems:"center", justifyContent:"space-between", borderTop:"1px solid "+T.rule, flexWrap:"wrap", gap:10 }}>
                    <span style={{ fontSize:11, color:T.textDim }}>Page {page} of {totalPages} · {sorted.length.toLocaleString()} results</span>
                    <div style={{ display:"flex", gap:5, flexWrap:"wrap" }}>
                      <button className="bg" disabled={page===1}          onClick={()=>setPage(1)}           style={{ padding:"5px 10px" }}>«</button>
                      <button className="bg" disabled={page===1}          onClick={()=>setPage(p=>p-1)}      style={{ padding:"5px 10px" }}>‹</button>
                      {Array.from({length:Math.min(5,totalPages)},(_,i)=>{
                        const p=page<=3?i+1:page+i-2;
                        if(p>totalPages) return null;
                        return <button key={p} className="bg" onClick={()=>setPage(p)} style={{ padding:"5px 10px", borderColor:p===page?T.turquoise:"rgba(255,255,255,0.12)", color:p===page?T.turquoise:T.textMid }}>{p}</button>;
                      })}
                      <button className="bg" disabled={page===totalPages} onClick={()=>setPage(p=>p+1)}      style={{ padding:"5px 10px" }}>›</button>
                      <button className="bg" disabled={page===totalPages} onClick={()=>setPage(totalPages)}  style={{ padding:"5px 10px" }}>»</button>
                    </div>
                  </div>
                </div>

                {/* Pro tip */}
                <div style={{ marginTop:14, padding:"14px 20px", background:"rgba(255,255,255,0.02)", border:"1px solid "+T.rule, borderRadius:8, fontSize:11, color:T.textDim, lineHeight:1.8 }}>
                  <strong style={{color:T.textMid}}>💡 Pro tip — best workflow:</strong> Click <span style={{color:"#7bb3f0"}}>LinkedIn</span> to find and connect with the exact person · Click <span style={{color:"#f4a57a"}}>Apollo</span> to get their verified email &amp; direct dial (free: 10 exports/month, no card needed) · Click <span style={{color:"#4ade80"}}>Hunter</span> to discover the email format used across the whole company · Click <span style={{color:"#fbbc04"}}>Google</span> as a catch-all that always surfaces something useful.
                </div>
              </div>
            )}

            {/* EMPTY STATE */}
            {!searched&&!loading&&(
              <div style={{ textAlign:"center", padding:"90px 20px" }}>
                <div style={{ fontFamily:"'DM Serif Display',serif", fontSize:40, marginBottom:14, background:"linear-gradient(to right,#00bcd4,#e83e8c)", WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent" }}>Find real decision makers.</div>
                <p style={{ fontSize:14, fontWeight:300, color:T.textDim, maxWidth:460, margin:"0 auto", lineHeight:1.9 }}>
                  Set your target title, location and industry — ClickLead generates live one-click searches across LinkedIn, Apollo, Hunter and Google, all pre-filled with your exact criteria.
                </p>
                <div style={{ display:"flex", justifyContent:"center", alignItems:"center", gap:10, marginTop:28 }}>
                  <span style={{ width:32, height:1, background:T.turquoise, display:"block", borderRadius:1 }}/>
                  <span style={{ fontSize:9, letterSpacing:"4px", color:T.textDim }}>BY CLICKCLICK</span>
                  <span style={{ width:32, height:1, background:T.pink, display:"block", borderRadius:1 }}/>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<ClickLead />);
  </script>
</body>
</html>

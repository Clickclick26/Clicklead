/* ── Apollo call through proxy ── */
async function callApollo(apiKey, params) {
  const body = { api_key: apiKey };
  if (params.titles && params.titles.length > 0)   body.person_titles = params.titles;
  if (params.location)                              body.person_locations = [params.location];
  if (params.keywords && params.keywords.length > 0) body.q_keywords = params.keywords.join(" ");
  if (params.industry) body.q_keywords = [body.q_keywords, params.industry].filter(Boolean).join(" ");
  if (params.funding) {
    body.organization_latest_funding_stage_cd = [
      "seed","angel","series_a","series_b","series_c","series_d","series_e","series_f"
    ];
  }
  body.page     = params.page || 1;
  body.per_page = params.perPage || 25;

  const res = await fetch(PROXY, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });

  if (res.status === 401) throw new Error("Invalid API key. Please check and try again.");
  if (res.status === 422) throw new Error("Search parameters invalid. Try simplifying your filters.");
  if (res.status === 429) throw new Error("Rate limit reached. Please wait a moment and try again.");
  if (!res.ok) {
    const e = await res.json().catch(()=>({}));
    throw new Error(e.message || e.error || "Error " + res.status + " — check your API key.");
  }
  return res.json();
}

/* ── Format Apollo person ── */
function fmt(p) {
  const org = p.organization || {};
  const email = p.email || null;
  const eStatus = p.email_status || "unknown";
  const li = p.linkedin_url
    ? (p.linkedin_url.startsWith("http") ? p.linkedin_url : "https://" + p.linkedin_url)
    : null;

  let fundingLabel = null;
  if (org.latest_funding_stage) {
    const stage  = org.latest_funding_stage.replace(/_/g," ").replace(/\b\w/g,c=>c.toUpperCase());
    const amount = org.funding_events?.[0]?.amount
      ? " – $" + (org.funding_events[0].amount / 1e6).toFixed(1) + "M"
      : "";
    fundingLabel = stage + amount;
  }

  let score = 60;
  if (email)                    score += 14;
  if (eStatus === "verified")   score += 10;
  else if (eStatus === "likely") score += 5;
  if (li)                        score +=  8;
  if (org.latest_funding_stage)  score +=  5;
  if (p.sanitized_phone)         score +=  3;
  score = Math.min(score, 99);

  return {
    id:       p.id || Math.random().toString(36),
    name:     [p.first_name, p.last_name].filter(Boolean).join(" ") || "—",
    title:    p.title || "—",
    company:  org.name || "—",
    industry: org.industry || "—",
    location: [p.city, p.state, p.country].filter(Boolean).join(", ") || "—",
    email, eStatus,
    emailVerified: eStatus === "verified",
    li,
    phone:    p.sanitized_phone || null,
    funding:  fundingLabel,
    employees: org.estimated_num_employees
      ? org.estimated_num_employees.toLocaleString() + " employees"
      : null,
    score,
  };
}

function toCSV(rows) {

    '"'+(r.funding||"")+'"',r.employees||"",r.score,
  ]);
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([[h,...b].map(r=>r.join(",")).join("\n")],{type:"text/csv"}));
  a.download = "clicklead.csv"; a.click();
}
function toXLS(rows) {
  const h = ["Name","Title","Company","Industry","Location","Email","Email Status","LinkedIn","Phone","Funding","Employees","Score"];
  const b = rows.map(r=>[r.name||"",r.title||"",r.company||"",r.industry||"",r.location||"",r.email||"",r.eStatus||"",r.li||"",r.phone||"",r.funding||"",r.employees||"",r.score]);

/* ── Keyword tag input ── */
function KwInput({ value, onChange }) {
  const [inp, setInp] = useState("");
  const ref = useRef(null);
  const add = t => { const v=t.trim(); if(v&&!value.includes(v)) onChange([...value,v]); setInp(""); };
  const rm  = t => onChange(value.filter(k=>k!==t));
  const key = e => {
    if(e.key==="Enter"||e.key===","){e.preventDefault();if(inp.trim())add(inp);}
    if(e.key==="Backspace"&&!inp&&value.length>0) rm(value[value.length-1]);
  };
  return (
    <div>
      <div onClick={()=>ref.current&&ref.current.focus()}
        style={{background:"rgba(255,255,255,0.04)",border:"1px solid "+T.rule,borderRadius:6,padding:"8px 12px",minHeight:44,display:"flex",flexWrap:"wrap",gap:5,alignItems:"center",cursor:"text"}}>
        {value.map(t=>(
          <span key={t} style={{display:"inline-flex",alignItems:"center",gap:4,background:"rgba(0,188,212,0.1)",border:"1px solid rgba(0,188,212,0.25)",borderRadius:100,padding:"3px 10px",fontSize:11,color:T.turquoise,fontFamily:"Poppins,sans-serif",fontWeight:500}}>
            {t} <span onClick={e=>{e.stopPropagation();rm(t);}} style={{cursor:"pointer",opacity:0.55,fontSize:13}}>×</span>
          </span>
        ))}
        <input ref={ref} value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={key}
          onBlur={()=>{if(inp.trim())add(inp);}}
          placeholder={value.length===0?"Type keyword, press Enter…":""}
          style={{background:"none",border:"none",outline:"none",color:T.textBright,fontFamily:"Poppins,sans-serif",fontSize:13,flex:1,minWidth:120}}/>
      </div>
      <div style={{marginTop:7,display:"flex",flexWrap:"wrap",gap:5}}>
        {KW_SUGGESTIONS.filter(k=>!value.includes(k)).slice(0,8).map(k=>(

            style={{fontSize:10,padding:"3px 10px",borderRadius:100,border:"1px solid "+T.rule,color:T.textDim,cursor:"pointer",fontFamily:"Poppins,sans-serif",transition:"all .15s"}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor=T.turquoise;e.currentTarget.style.color=T.turquoise;}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor=T.rule;e.currentTarget.style.color=T.textDim;}}
          >+ {k}</span>
        ))}
      </div>
    </div>
  );
}

/* ── Multi-select title picker ── */

    return ()=>document.removeEventListener("mousedown",h);

    <div ref={ref} style={{position:"relative"}}>
      <div onClick={()=>setOpen(o=>!o)}

              ))
          }
        </div>
        <span style={{color:T.textDim,fontSize:9,flexShrink:0}}>{open?"▲":"▼"}</span>
      </div>
      {open&&(
        <div style={{position:"absolute",top:"calc(100% + 4px)",left:0,right:0,background:"#181818",border:"1px solid "+T.rule,borderRadius:6,zIndex:200,maxHeight:260,overflowY:"auto",boxShadow:"0 16px 48px rgba(0,0,0,0.6)"}}>
          {value.length>0&&(
            <div onClick={()=>onChange([])}

                {value.includes(t)?"✓":""}

        </div>
      )}
    </div>
  );
}

/* ── Email badge ── */
function EmailBadge({status}) {
  const map = {
    verified: ["#4ade80","rgba(74,222,128,0.1)","rgba(74,222,128,0.25)","✓ verified"],
    likely:   ["#fbbf24","rgba(251,191,36,0.1)","rgba(251,191,36,0.25)","~ likely"],
    invalid:  ["#f87171","rgba(248,113,113,0.1)","rgba(248,113,113,0.25)","✕ invalid"],
  };
  const [col,bg,border,label] = map[status]||[T.textDim,"rgba(255,255,255,0.04)",T.rule,"? unknown"];
  return (
    <span style={{fontSize:9,padding:"2px 8px",borderRadius:100,background:bg,border:"1px solid "+border,color:col,whiteSpace:"nowrap",letterSpacing:"0.5px"}}>
      {label}
    </span>
  );
}

                  value={keyInput} onChange={e=>setKeyInput(e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&saveKey()}
                  placeholder="Paste your Apollo API key here…"/>
                <span onClick={()=>setKeyVisible(v=>!v)}
                  style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",cursor:"pointer",fontSize:14,color:T.textDim,userSelect:"none"}}>
                  {keyVisible?"🙈":"👁"}
                </span>
              </div>
              <button onClick={saveKey} className="pri" style={{whiteSpace:"nowrap",minWidth:120}}>Connect →</button>
            </div>
            {apiKey&&<div style={{marginTop:10,fontSize:11,color:"#4ade80"}}>✓ Connected — ready to search 275M real contacts</div>}
          </div>
        </div>
      )}

      <div style={{maxWidth:1500,margin:"0 auto",padding:"32px 40px"}}>

        {/* ── SEARCH PANEL ── */}
        <div style={{background:T.ink2,border:"1px solid "+T.rule,borderRadius:10,padding:"28px 32px",marginBottom:24}}>
          <div style={{fontSize:9,letterSpacing:"4px",textTransform:"uppercase",color:T.textDim,marginBottom:22,fontWeight:600}}>Search Parameters</div>

          <div style={{display:"grid",gridTemplateColumns:"1.5fr 1fr 1fr",gap:16,marginBottom:16}}>
            <div>
              <label style={lS}>Intent Keywords</label>
              <KwInput value={keywords} onChange={setKeywords}/>
            </div>
            <div>
              <label style={lS}>Geographic Location</label>
              <input style={iS} value={location} list="locs" placeholder="e.g. London, United Kingdom"
                onChange={e=>setLocation(e.target.value)}
                onFocus={e=>e.target.style.borderColor=T.turquoise}
                onBlur={e=>e.target.style.borderColor=T.rule}/>
              <datalist id="locs">{LOCATIONS.map(l=><option key={l} value={l}/>)}</datalist>
            </div>
            <div>
              <label style={lS}>Industry</label>
              <select style={iS} value={industry} onChange={e=>setIndustry(e.target.value)}
                onFocus={e=>e.target.style.borderColor=T.turquoise}
                onBlur={e=>e.target.style.borderColor=T.rule}>
                <option value="">All Industries</option>
                {INDUSTRIES.map(i=><option key={i} value={i}>{i}</option>)}
              </select>
            </div>
          </div>

          <div style={{display:"grid",gridTemplateColumns:"1fr auto auto auto",gap:16,alignItems:"end"}}>
            <div>
              <label style={lS}>Decision Maker Titles</label>
              <TitlePicker value={titles} onChange={setTitles}/>
            </div>
            <div>
              <label style={lS}>Results per page</label>
              <select style={{...iS,width:140}} value={perPage} onChange={e=>setPerPage(Number(e.target.value))}
                onFocus={e=>e.target.style.borderColor=T.turquoise}
                onBlur={e=>e.target.style.borderColor=T.rule}>
                {[10,25,50,100].map(n=><option key={n} value={n}>{n} contacts</option>)}
              </select>
            </div>
            <div>
              <label style={{...lS,marginBottom:12}}>&nbsp;</label>
              <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",fontSize:13,color:T.textMid,fontWeight:300,whiteSpace:"nowrap",paddingBottom:2}}>
                <input type="checkbox" checked={funding} onChange={e=>setFunding(e.target.checked)}/>
                Recently Funded Only
              </label>
            </div>
            <div>
              <label style={{...lS,marginBottom:12}}>&nbsp;</label>
              <button onClick={handleSearch} disabled={loading||!apiKey} className="pri">
                {loading?<span className="pu">Searching…</span>:"Find Real Leads →"}
              </button>
            </div>
          </div>

          {!apiKey&&(
            <div style={{fontSize:12,color:T.pink,marginTop:14}}>
              ⚠ Enter your Apollo API key using the ⚙ button above to start searching.
            </div>
          )}
        </div>

        {/* ── ERROR ── */}
        {error&&(
          <div style={{background:"rgba(248,113,113,0.08)",border:"1px solid rgba(248,113,113,0.25)",borderRadius:8,padding:"16px 20px",marginBottom:20,color:"#f87171",fontSize:13,lineHeight:1.6}}>
            ⚠ {error}
          </div>
        )}

        {/* ── LOADING ── */}
        {loading&&(
          <div style={{textAlign:"center",padding:"80px 20px"}}>
            <div style={{fontFamily:"'DM Serif Display',serif",fontSize:34,marginBottom:14,background:"linear-gradient(to right,#00bcd4,#e83e8c)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>
              Searching Apollo Database
            </div>
            <div style={{fontSize:12,color:T.textDim,letterSpacing:"2px",fontWeight:300}}>
              Pulling real decision makers with verified emails &amp; LinkedIn profiles…
            </div>
            <div style={{width:220,height:2,background:T.rule,borderRadius:1,margin:"24px auto 0",overflow:"hidden"}}>
              <div style={{height:"100%",background:"linear-gradient(to right,#00bcd4,#e83e8c)",borderRadius:1,animation:"load 1.4s ease-in-out infinite"}}/>
            </div>
          </div>
        )}

        {/* ── RESULTS ── */}
        {searched&&!loading&&(
          <div className="fi">
            <div style={{display:"flex",gap:10,marginBottom:18,flexWrap:"wrap"}}>
              <Stat num={contacts.length.toLocaleString()} label="Loaded" color={T.turquoise}/>
              <Stat num={total.toLocaleString()} label="Total Available" color="rgba(255,255,255,0.5)"/>
              <Stat num={contacts.filter(c=>c.emailVerified).length.toLocaleString()} label="Verified Emails" color="#4ade80"/>
              <Stat num={contacts.filter(c=>c.email&&!c.emailVerified).length.toLocaleString()} label="Likely Emails" color="#fbbf24"/>
              <Stat num={contacts.filter(c=>c.funding).length.toLocaleString()} label="Funded Companies" color={T.pink}/>
              <Stat num={contacts.filter(c=>c.li).length.toLocaleString()} label="LinkedIn Profiles" color="#7bb3f0"/>
            </div>

            <div style={{display:"flex",gap:10,marginBottom:12,alignItems:"center",flexWrap:"wrap"}}>
              <span style={{fontSize:11,color:T.textDim}}>
                {selected.size>0?selected.size+" selected":sorted.length.toLocaleString()+" contacts"}
              </span>
              <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center",marginLeft:"auto"}}>
                <select className="bg" value={emailFilter} onChange={e=>{setEmailFilter(e.target.value);setDispPage(1);}} style={{padding:"6px 14px",cursor:"pointer"}}>
                  <option value="all">All Contacts</option>
                  <option value="has_email">Has Email</option>
                  <option value="verified">Verified Only</option>
                </select>
                <button className="bg" onClick={()=>toCSV(expRows)}>⬇ CSV</button>
                <button className="bg" onClick={()=>toXLS(expRows)}>⬇ Excel</button>
                <button className="bg" onClick={()=>{alert("Import the downloaded CSV into Google Sheets via File › Import.");toCSV(expRows);}}>📊 Google Sheets</button>
              </div>
            </div>

            <div style={{background:T.ink2,border:"1px solid "+T.rule,borderRadius:10,overflow:"hidden"}}>
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                  <thead>
                    <tr style={{background:"rgba(0,0,0,0.4)",borderBottom:"1px solid "+T.rule}}>
                      <th style={{padding:"11px 14px",width:36}}>
                        <input type="checkbox" checked={selected.size===pageRows.length&&pageRows.length>0} onChange={tAll}/>
                      </th>
                      {[["name","Name"],["title","Title"],["company","Company"],["industry","Industry"],["location","Location"],["email","Email"],["li","LinkedIn"],["score","Score"]].map(([col,lbl])=>(
                        <th key={col} onClick={()=>tSort(col)}
                          style={{padding:"11px 14px",textAlign:"left",color:T.textDim,fontSize:9,letterSpacing:"2px",textTransform:"uppercase",fontWeight:600}}>
                          {lbl}<SA col={col}/>
                        </th>
                      ))}
                      <th style={{padding:"11px 14px",textAlign:"left",color:T.textDim,fontSize:9,letterSpacing:"2px",textTransform:"uppercase",fontWeight:600}}>Signals</th>
                    </tr>
                  </thead>
                  <tbody>
                    {pageRows.map((c,i)=>(
                      <tr key={c.id} className="rh" style={{borderBottom:"1px solid "+T.rule,background:i%2===0?T.ink2:"rgba(255,255,255,0.01)"}}>
                        <td style={{padding:"10px 14px"}}>
                          <input type="checkbox" checked={selected.has(c.id)} onChange={()=>tOne(c.id)}/>
                        </td>
                        <td style={{padding:"10px 14px",whiteSpace:"nowrap",fontWeight:600,color:T.textBright}}>{c.name}</td>
                        <td style={{padding:"10px 14px",color:T.textMid,whiteSpace:"nowrap",maxWidth:180,overflow:"hidden",textOverflow:"ellipsis"}} title={c.title}>{c.title}</td>
                        <td style={{padding:"10px 14px",color:T.turquoise,whiteSpace:"nowrap",fontWeight:500}}>{c.company}</td>
                        <td style={{padding:"10px 14px",color:T.textDim,whiteSpace:"nowrap",fontSize:11}}>{c.industry}</td>
                        <td style={{padding:"10px 14px",color:T.textDim,whiteSpace:"nowrap",fontSize:11}}>{c.location}</td>
                        <td style={{padding:"10px 14px",minWidth:210}}>
                          {c.email
                            ? <div>
                                <div style={{color:"#e2e8f0",fontSize:11,fontFamily:"monospace",marginBottom:4}}>{c.email}</div>
                                <EmailBadge status={c.eStatus}/>
                              </div>
                            : <span style={{color:T.textDim,fontSize:11}}>Not available</span>
                          }
                          {c.phone&&<div style={{fontSize:10,color:T.textDim,marginTop:4}}>📞 {c.phone}</div>}
                        </td>
                        <td style={{padding:"10px 14px"}}>
                          {c.li
                            ? <a href={c.li} target="_blank" rel="noreferrer"
                                style={{display:"inline-flex",alignItems:"center",gap:5,fontSize:11,color:"#7bb3f0",textDecoration:"none",padding:"4px 10px",borderRadius:100,background:"rgba(123,179,240,0.08)",border:"1px solid rgba(123,179,240,0.2)",whiteSpace:"nowrap",transition:"all .15s"}}
                                onMouseEnter={e=>{e.currentTarget.style.background="rgba(123,179,240,0.18)";e.currentTarget.style.borderColor="rgba(123,179,240,0.4)";}}
                                onMouseLeave={e=>{e.currentTarget.style.background="rgba(123,179,240,0.08)";e.currentTarget.style.borderColor="rgba(123,179,240,0.2)";}}>
                                🔗 View Profile ↗
                              </a>
                            : <span style={{color:T.textDim,fontSize:11}}>—</span>
                          }
                        </td>
                        <td style={{padding:"10px 14px",textAlign:"center"}}>
                          <div style={{fontFamily:"'DM Serif Display',serif",fontSize:17,background:"linear-gradient(to right,#00bcd4,#e83e8c)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",lineHeight:1}}>{c.score}</div>
                          <div style={{marginTop:4,width:36}}><div className="sbf" style={{width:(((c.score-60)/39)*36)+"px"}}/></div>
                        </td>
                        <td style={{padding:"10px 14px",minWidth:160}}>
                          <div style={{display:"flex",flexDirection:"column",gap:4}}>
                            {c.funding&&<span style={{fontSize:9,padding:"3px 8px",borderRadius:4,background:"rgba(251,191,36,0.08)",border:"1px solid rgba(251,191,36,0.2)",color:"#fbbf24",whiteSpace:"nowrap"}}>🏦 {c.funding}</span>}
                            {c.employees&&<span style={{fontSize:9,padding:"3px 8px",borderRadius:4,background:"rgba(255,255,255,0.04)",border:"1px solid "+T.rule,color:T.textDim,whiteSpace:"nowrap"}}>👥 {c.employees}</span>}
                            {!c.funding&&!c.employees&&<span style={{color:T.rule,fontSize:10}}>—</span>}
                          </div>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>

              <div style={{padding:"12px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",borderTop:"1px solid "+T.rule,flexWrap:"wrap",gap:10}}>
                <span style={{fontSize:11,color:T.textDim}}>
                  Page {dispPage} of {totalDisp} · {sorted.length.toLocaleString()} contacts
                  {canMore&&<span style={{color:T.turquoise}}> · {(total-contacts.length).toLocaleString()} more available</span>}
                </span>
                <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                  {canMore&&(
                    <button onClick={handleMore} disabled={loadingMore} className="bg" style={{borderColor:"rgba(0,188,212,0.4)",color:T.turquoise,marginRight:4}}>
                      {loadingMore?<span className="pu">Loading…</span>:"+ Load More"}
                    </button>
                  )}
                  <button className="bg" disabled={dispPage===1}         onClick={()=>setDispPage(1)}         style={{padding:"5px 10px"}}>«</button>
                  <button className="bg" disabled={dispPage===1}         onClick={()=>setDispPage(p=>p-1)}    style={{padding:"5px 10px"}}>‹</button>
                  {Array.from({length:Math.min(5,totalDisp)},(_,i)=>{
                    const p=dispPage<=3?i+1:dispPage+i-2;
                    if(p>totalDisp) return null;
                    return <button key={p} className="bg" onClick={()=>setDispPage(p)} style={{padding:"5px 10px",borderColor:p===dispPage?T.turquoise:"rgba(255,255,255,0.12)",color:p===dispPage?T.turquoise:T.textMid}}>{p}</button>;
                  })}
                  <button className="bg" disabled={dispPage===totalDisp} onClick={()=>setDispPage(p=>p+1)}   style={{padding:"5px 10px"}}>›</button>
                  <button className="bg" disabled={dispPage===totalDisp} onClick={()=>setDispPage(totalDisp)} style={{padding:"5px 10px"}}>»</button>
                </div>
              </div>
            </div>
          </div>
        )}

        {/* ── EMPTY STATE ── */}
        {!searched&&!loading&&!error&&(
          <div style={{textAlign:"center",padding:"90px 20px"}}>
            <div style={{fontFamily:"'DM Serif Display',serif",fontSize:42,marginBottom:14,background:"linear-gradient(to right,#00bcd4,#e83e8c)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>
              Real people. Real emails.
            </div>
            <p style={{fontSize:14,fontWeight:300,color:T.textDim,maxWidth:480,margin:"0 auto",lineHeight:1.9}}>
              {apiKey
                ? "Set your filters above and hit Find Real Leads — ClickLead pulls real named decision makers directly from Apollo's database of 275 million contacts."
                : "Connect your Apollo API key using the ⚙ button in the top right to get started."
              }
            </p>
            <div style={{display:"flex",justifyContent:"center",alignItems:"center",gap:10,marginTop:28}}>
              <span style={{width:32,height:1,background:T.turquoise,display:"block",borderRadius:1}}/>
              <span style={{fontSize:9,letterSpacing:"4px",color:T.textDim}}>BY CLICKCLICK</span>
              <span style={{width:32,height:1,background:T.pink,display:"block",borderRadius:1}}/>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<ClickLead />);
</script>
</body>
</html>
